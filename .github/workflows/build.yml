---
name: OneTime Build For Codasda

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Official Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Execute Author's Official Build Pipeline
        run: |
          # 1. 建立最终用于下载的干净目录
          mkdir -p build_outputs
          
          # 2. 百分之百运行作者写的 Makefile，在本地生成标准的 .build/ 编译缓存
          make build
          
          # 3. 此时隐藏目录 .build 已经就绪，完美契合作者的 images/Dockerfile 路径
          docker build -f images/Dockerfile -t prom2parquet:latest .
          
          # 4. 把官方镜像导出为压缩包
          docker save prom2parquet:latest | gzip > build_outputs/prom2parquet_image.tar.gz
          
          # 5. 同时把 Makefile 刚才在 .build/ 目录下原生编译出来的 Linux 二进制也提取出来放好
          cp .build/prom2parquet build_outputs/prom2parquet

      - name: Upload Author Approved Outputs
        uses: actions/upload-artifact@v4
        with:
          name: prom2parquet-outputs
          path: build_outputs/
          retention-days: 1
