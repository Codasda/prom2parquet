---
name: OneTime Build For Codasda

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Compile and Package Artifacts
        run: |
          # 1. Create a dedicated output directory
          mkdir -p build_outputs
          
          # 2. Build Linux AMD64 Binary
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build_outputs/prom2parquet main.go
          
          # 3. Build Docker Image and export as tar.gz
          docker build -t prom2parquet:latest .
          docker save prom2parquet:latest | gzip > build_outputs/prom2parquet_image.tar.gz

      - name: Upload Clean Outputs
        uses: actions/upload-artifact@v4
        with:
          name: prom2parquet-outputs
          path: build_outputs/
          retention-days: 1
