---
name: OneTime Build For Codasda

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build via Project Dockerfile
        run: |
          # 1. 创建干净的输出目录
          mkdir -p build_outputs
          
          # 2. 直接利用原项目自带的 Dockerfile 进行容器编译（它自己会处理好所有依赖）
          docker build -t prom2parquet:latest .
          
          # 3. 将编译好的镜像打包成压缩包
          docker save prom2parquet:latest | gzip > build_outputs/prom2parquet_image.tar.gz

          # 4. 临时启动容器，直接把里面编译好的 linux 纯二进制文件“偷”出来
          docker create --name temp_container prom2parquet:latest
          docker cp temp_container:/app/prom2parquet build_outputs/prom2parquet
          docker rm temp_container

      - name: Upload Clean Outputs
        uses: actions/upload-artifact@v4
        with:
          name: prom2parquet-outputs
          path: build_outputs/
          retention-days: 1
