---
name: OneTime Build For Codasda

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载代码，并递归拉取子模块文件
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 2. 安装官方 Go 环境
      - name: Install Official Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      # 3. 严格执行作者 README 里交代的全部命令
      - name: Execute Strict Author README Commands
        run: |
          mkdir -p build_outputs
          
          # 【步骤 1】初始化并更新子模块
          git submodule init
          git submodule update
          
          # 【步骤 2】建立并初始化开发环境（这是之前报错的根本原因）
          make setup
          
          # 【步骤 3】正式开始编译 prom2parquet 二进制
          make build
          
          # 【步骤 4】构建原厂 Docker 镜像
          docker build -f images/Dockerfile -t prom2parquet:latest .
          
          # 【步骤 5】打包并收集你需要的所有产物
          docker save prom2parquet:latest | gzip > build_outputs/prom2parquet_image.tar.gz
          cp .build/prom2parquet build_outputs/prom2parquet

      # 4. 上传产物供你下载
      - name: Upload Finished Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prom2parquet-outputs
          path: build_outputs/
          retention-days: 1
