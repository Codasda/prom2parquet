---
name: OneTime Build For Codasda

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Using Real Deploy Dockerfile
        run: |
          # 1. 创建干净的输出目录
          mkdir -p build_outputs
          
          # 2. 【核心修复】使用真实的绝对路径 deploy/Dockerfile 进行编译
          docker build -f deploy/Dockerfile -t prom2parquet:latest .
          
          # 3. 将原厂编译出来的完整镜像打包成 tar.gz 压缩包
          docker save prom2parquet:latest | gzip > build_outputs/prom2parquet_image.tar.gz

          # 4. 从原厂镜像中把纯 Linux AMD64 二进制程序拷贝出来
          docker create --name temp_container prom2parquet:latest
          docker cp temp_container:/app/prom2parquet build_outputs/prom2parquet
          docker rm temp_container

      - name: Upload Clean Outputs
        uses: actions/upload-artifact@v4
        with:
          name: prom2parquet-outputs
          path: build_outputs/
          retention-days: 1
